[pytest]
addopts =
    --html=reports/report.html
    --self-contained-html
    --slowmo=300

testpaths = tests

# NOTE: Do NOT add --headed here.
# On Linux without a display (no GUI), --headed crashes instantly.
# To run with a visible browser on a GUI machine:
#   HEADED=1 pytest tests/test_01_auth.py -v